<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fish Buddy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffdede;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 360px;
    height: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .character-wrap {
    position: relative;
    cursor: pointer;
    user-select: none;
    z-index: 2;
  }

  .character-wrap img {
    width: 230px;
    height: 230px;
    object-fit: contain;
    display: block;
    transition: filter 0.3s ease;
  }

  @keyframes wiggle {
    0%   { transform: rotate(0deg) scale(1); }
    10%  { transform: rotate(-5deg) scale(1.04); }
    20%  { transform: rotate(5deg) scale(1.04); }
    35%  { transform: rotate(-4deg) scale(1.06); }
    50%  { transform: rotate(4deg) scale(1.06); }
    65%  { transform: rotate(-2deg) scale(1.03); }
    80%  { transform: rotate(2deg) scale(1.03); }
    100% { transform: rotate(0deg) scale(1); }
  }

  .character-wrap.hovering {
    animation: wiggle 0.45s ease infinite;
  }

  .character-wrap.hovering img {
    filter: drop-shadow(0 0 16px rgba(255, 140, 160, 0.7));
  }

  .note {
    position: absolute;
    pointer-events: none;
    animation: floatUp 1.5s ease-out forwards;
    z-index: 10;
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    60%  { opacity: 1; transform: translateY(-65px) scale(1.25) rotate(14deg); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.7) rotate(-10deg); }
  }

  .hint {
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(180, 80, 100, 0.55);
    font-size: 12px;
    font-family: 'Georgia', serif;
    letter-spacing: 0.06em;
    white-space: nowrap;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }

  /* ── Mobile: scale everything 3× ── */
  @media (max-width: 768px), (pointer: coarse) {
    .scene {
      width: 100vw;
      height: 100vh;
    }
    .character-wrap img {
      width: 90vw;
      height: 90vw;
      max-width: 480px;
      max-height: 480px;
    }
    .hint {
      font-size: 28px;
      bottom: 12vh;
    }
  }
</style>
</head>

['c5','e5','f5','g5','a5','c6'].forEach(name => {
  audioEls[name] = document.getElementById('note_' + name);
});

// ── Play a note using <audio> element ────────────────────────
// Much more reliable than Web Audio API on all mobile browsers,
// Instagram in-app browser, Linktree WebView, Safari, Chrome.
function playNote(name) {
  if (!unlocked) return;
  const el = audioEls[name];
  if (!el) return;
  try {
    el.currentTime = 0;
    const p = el.play();
    if (p && p.catch) p.catch(() => {});
  } catch(e) {}
}

// ── Sound unlock button ───────────────────────────────────────
// Uses "click" event — the ONE gesture all WebViews trust for audio.
// On click: pre-play all audio elements silently to "warm up" them,
// then play an audible confirmation beep.
const soundBtn = document.createElement('button');
soundBtn.textContent = '🔇 tap to enable sound';
soundBtn.style.cssText = `
  position: fixed;
  bottom: ${isMobile ? '48px' : '24px'};
  left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.92);
  border: 2px solid rgba(200,80,100,0.45);
  border-radius: 999px;
  padding: ${isMobile ? '20px 40px' : '10px 24px'};
  font-size: ${isMobile ? '30px' : '15px'};
  font-family: Georgia, serif;
  color: rgba(150,50,70,0.9);
  cursor: pointer; z-index: 999;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  white-space: nowrap;
`;
document.body.appendChild(soundBtn);

soundBtn.addEventListener('click', function() {
  // Warm up every audio element inside the click gesture
  // This is what unlocks <audio> on iOS/Android WebViews
  Object.values(audioEls).forEach(el => {
    el.volume = 0;
    el.currentTime = 0;
    const p = el.play();
    if (p && p.then) p.then(() => { el.pause(); el.volume = 1; el.currentTime = 0; })
                      .catch(() => {});
  });

  unlocked = true;

  // Audible confirmation: two-note beep so user knows it worked
  setTimeout(() => {
    const a = audioEls['a5'];
    const c = audioEls['c6'];
    a.volume = 1; a.currentTime = 0; a.play().catch(()=>{});
    setTimeout(() => { c.volume = 1; c.currentTime = 0; c.play().catch(()=>{}); }, 180);
  }, 80);

  soundBtn.textContent = '🔊 sound enabled!';
  soundBtn.style.background = 'rgba(255,235,235,0.95)';
  soundBtn.disabled = true;
  setTimeout(() => {
    soundBtn.style.transition = 'opacity 0.7s';
    soundBtn.style.opacity = '0';
    setTimeout(() => soundBtn.remove(), 800);
  }, 1800);
});

// ── Notes visual ──────────────────────────────────────────────
function spawnNote() {
  const el = document.createElement('div');
  el.className = 'note';
  el.textContent = noteEmojis[Math.floor(Math.random() * noteEmojis.length)];
  const rect   = scene.getBoundingClientRect();
  const cx     = rect.width  / 2;
  const cy     = rect.height / 2;
  const angle  = Math.random() * Math.PI * 2;
  const radius = (isMobile ? 130 : 60) + Math.random() * (isMobile ? 90 : 50);
  el.style.left     = (cx + Math.cos(angle) * radius - 18) + 'px';
  el.style.top      = (cy + Math.sin(angle) * radius - 18) + 'px';
  el.style.fontSize = ((isMobile ? 40 : 18) + Math.random() * (isMobile ? 18 : 12)) + 'px';
  el.style.color    = `hsl(${340 + Math.random() * 30}, 75%, 45%)`;
  scene.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

function tick() {
  if (!isHovering) return;
  playNote(melody[noteIndex % melody.length]);
  noteIndex++;
  spawnNote();
  noteTimer = setTimeout(tick, 270);
}

function startHover() {
  if (isHovering) return;
  isHovering = true;
  character.classList.add('hovering');
  hint.style.opacity = '0';
  tick();
}

function stopHover() {
  isHovering = false;
  character.classList.remove('hovering');
  hint.style.opacity = '1';
  clearTimeout(noteTimer);
}

// ── Desktop ───────────────────────────────────────────────────
character.addEventListener('mouseenter', startHover);
character.addEventListener('mouseleave', stopHover);

// ── Mobile: hold = play, lift = stop ─────────────────────────
character.addEventListener('touchstart', (e) => {
  e.preventDefault();
  startHover();
}, { passive: false });

character.addEventListener('touchend', (e) => {
  e.preventDefault();
  stopHover();
}, { passive: false });

hint.textContent = isMobile ? 'hold me ✦' : 'Click and Hover ✦';
</script>
