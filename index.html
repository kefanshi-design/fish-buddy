<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fish Buddy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffdede;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: min(90vw, 400px);
    height: min(90vw, 400px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .character-wrap {
    position: relative;
    cursor: pointer;
    user-select: none;
    touch-action: none;
    z-index: 2;
  }

  .character-wrap img {
    width: min(80vw, 300px);
    height: min(80vw, 300px);
    object-fit: contain;
    display: block;
    transition: filter 0.3s ease;
    -webkit-user-drag: none;
  }

  @keyframes wiggle {
    0%   { transform: rotate(0deg) scale(1); }
    15%  { transform: rotate(-5deg) scale(1.05); }
    30%  { transform: rotate(5deg) scale(1.05); }
    50%  { transform: rotate(-3deg) scale(1.07); }
    70%  { transform: rotate(3deg) scale(1.05); }
    85%  { transform: rotate(-1deg) scale(1.02); }
    100% { transform: rotate(0deg) scale(1); }
  }

  .character-wrap.active {
    animation: wiggle 0.45s ease infinite;
  }

  .character-wrap.active img {
    filter: drop-shadow(0 0 18px rgba(255,120,150,0.7));
  }

  .note {
    position: absolute;
    pointer-events: none;
    animation: floatUp 1.5s ease-out forwards;
    z-index: 10;
    font-style: normal;
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    60%  { opacity: 1; transform: translateY(-70px) scale(1.3) rotate(14deg); }
    100% { opacity: 0; transform: translateY(-130px) scale(0.7) rotate(-10deg); }
  }

  .hint {
    position: absolute;
    bottom: -2em;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(180,70,90,0.6);
    font-size: clamp(13px, 3.5vw, 18px);
    font-family: Georgia, serif;
    letter-spacing: 0.05em;
    white-space: nowrap;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  #soundBtn {
    position: fixed;
    bottom: max(28px, 4vh);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.93);
    border: 2px solid rgba(200,80,100,0.45);
    border-radius: 999px;
    padding: clamp(8px,2vw,12px) clamp(16px,4vw,26px);
    font-size: clamp(13px,3.2vw,16px);
    font-family: Georgia, serif;
    color: rgba(150,50,70,0.95);
    cursor: pointer;
    z-index: 9999;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    white-space: nowrap;
    -webkit-tap-highlight-color: rgba(255,160,180,0.3);
    transition: background 0.2s, opacity 0.6s;
  }
</style>
</head>

};

const melody     = ['c5','e5','g5','a5','c6','a5','g5','e5','f5','a5','c6','a5','e5','c5','e5','g5'];
const noteEmojis = ['♩','♪','♫','♬','🎵','🎶'];

let unlocked   = false;
let isActive   = false;
let noteIndex  = 0;
let noteTimer  = null;

// ── Play via single <audio> element ──────────────────────────
// Changing src + play() on ONE element is the most reliable
// method across ALL mobile browsers and in-app WebViews.
function playNote(name) {
  if (!unlocked) return;
  try {
    mainAudio.src = noteSrcs[name];
    mainAudio.currentTime = 0;
    const p = mainAudio.play();
    if (p && p.catch) p.catch(() => {});
  } catch(e) {}
}

// ── Unlock on button tap ──────────────────────────────────────
// The button uses BOTH click and touchend for maximum compatibility.
// Audio src is set and play() is called SYNCHRONOUSLY inside
// the handler — no setTimeout, no await, no promise chains.
function doUnlock() {
  if (unlocked) return;
  unlocked = true;

  // Play confirmation beep synchronously in this gesture
  mainAudio.src = noteSrcs['c6'];
  mainAudio.currentTime = 0;
  mainAudio.play().catch(() => { unlocked = false; });

  soundBtn.textContent = '🔊 sound on!';
  soundBtn.disabled = true;
  setTimeout(() => {
    soundBtn.style.opacity = '0';
    setTimeout(() => soundBtn.remove(), 700);
  }, 1400);
}

soundBtn.addEventListener('click', doUnlock);
soundBtn.addEventListener('touchend', (e) => {
  e.preventDefault();
  doUnlock();
});

// Desktop: unlock on first mousedown anywhere on the page.
// This means hovering immediately after any click works —
// user doesn't need to find the button first on desktop.
if (!isMobile) {
  document.addEventListener('mousedown', doUnlock, { once: true });
  // Update button label for desktop context
  soundBtn.textContent = '🔇 click anywhere to start';
}

// ── Notes visual ──────────────────────────────────────────────
function spawnNote() {
  const el   = document.createElement('div');
  el.className = 'note';
  el.textContent = noteEmojis[Math.floor(Math.random() * noteEmojis.length)];
  const r  = scene.getBoundingClientRect();
  const cx = r.width  / 2;
  const cy = r.height / 2;
  const angle  = Math.random() * Math.PI * 2;
  const radius = r.width * 0.35 + Math.random() * r.width * 0.15;
  el.style.left     = (cx + Math.cos(angle) * radius - 16) + 'px';
  el.style.top      = (cy + Math.sin(angle) * radius - 16) + 'px';
  el.style.fontSize = (r.width * 0.07 + Math.random() * r.width * 0.04) + 'px';
  el.style.color    = `hsl(${340 + Math.random() * 30}, 75%, 45%)`;
  scene.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

function tick() {
  if (!isActive) return;
  playNote(melody[noteIndex % melody.length]);
  noteIndex++;
  spawnNote();
  noteTimer = setTimeout(tick, 270);
}

function startActive() {
  if (isActive) return;
  isActive = true;
  character.classList.add('active');
  hint.style.opacity = '0';
  tick();
}

function stopActive() {
  isActive = false;
  character.classList.remove('active');
  hint.style.opacity = '1';
  clearTimeout(noteTimer);
}

// ── Desktop: mouse ────────────────────────────────────────────
character.addEventListener('mouseenter', startActive);
character.addEventListener('mouseleave', stopActive);

// ── Mobile: hold to play ──────────────────────────────────────
character.addEventListener('touchstart', (e) => {
  e.preventDefault();
  startActive();
}, { passive: false });

character.addEventListener('touchend', (e) => {
  e.preventDefault();
  stopActive();
}, { passive: false });

character.addEventListener('touchcancel', stopActive);

hint.textContent = isMobile ? 'hold me ✦' : 'Click and Hover ✦';
</script>
